# Drop-in pentru server block sway.ovh.
# Plaseaza in /etc/nginx/sites-available/sway (sau snippet inclus prin `include`).
# Reload: sudo nginx -t && sudo systemctl reload nginx

# Hide version
server_tokens off;

# Gzip
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain text/css text/javascript application/javascript
    application/json application/xml application/xml+rss
    image/svg+xml font/woff font/woff2;

# Brotli (necesita ngx_brotli compilat). Decomenteaza daca ai modulul.
# brotli on;
# brotli_comp_level 5;
# brotli_static on;
# brotli_types
#     text/plain text/css application/javascript application/json
#     image/svg+xml font/woff2;

# gzip_static — serveste .gz precomprimat (cost CPU 0). deploy.sh genereaza .gz langa fiecare asset.
gzip_static on;

# Rate-limit zona API: 30 req/s pe IP, burst 60.
limit_req_zone $binary_remote_addr zone=swayapi:10m rate=30r/s;
limit_req_status 429;

server {
    listen 443 ssl http2;
    server_name sway.ovh www.sway.ovh;

    root /var/www/sway;   # AJUSTEAZA daca alt path
    index index.html;

    # SSL cert — pastreaza ce ai deja
    # ssl_certificate     /etc/letsencrypt/live/sway.ovh/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/sway.ovh/privkey.pem;

    # Spring trimite oricum HSTS / X-Frame / CSP. Pastrez fallback nginx pe ce
    # serveste el direct (static), ca sa nu lipseasca pe assets/index.html.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;

    # Limit upload body
    client_max_body_size 1m;

    # Hashed bundle assets — imutabile, cache lung
    location ^~ /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Imagini fundal slideshow + screenshots
    location ^~ /images/ {
        access_log off;
        add_header Cache-Control "public, max-age=2592000" always;
        try_files $uri =404;
    }

    # Fonts/favicon/country flags
    location ~* \.(woff2?|ttf|eot|ico)$ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location ^~ /countryflags/ {
        access_log off;
        add_header Cache-Control "public, max-age=2592000" always;
        try_files $uri =404;
    }

    # SSE — disable buffering & long timeout
    location = /api/stream {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        chunked_transfer_encoding off;
        add_header X-Accel-Buffering no always;
    }

    # API normal → Spring backend (cu rate limit)
    location /api/ {
        limit_req zone=swayapi burst=60 nodelay;
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # SPA fallback — index.html nu se cache-uieste (sa nu se infunde dupa deploy)
    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name sway.ovh www.sway.ovh;
    return 301 https://$host$request_uri;
}
