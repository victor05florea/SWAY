version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: cs2_mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: vic
      MYSQL_DATABASE: sway_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d

volumes:
  db_data: